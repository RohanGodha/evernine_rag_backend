services:
  db:
    # pgvector image = Postgres 16 + the `vector` extension preinstalled. The
    # extension is only used if RAG_ENABLED=true; otherwise this behaves as a
    # plain Postgres 16. (Swap to postgres:16-alpine if you never enable RAG.)
    image: pgvector/pgvector:pg16
    container_name: aster_oak_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aster_oak
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aster_oak"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
